<script>
/* =========================================================================
   APP CHEFE DE GRUPO — Constróii ES
   Usa exatamente o mesmo modelo de dados da app Funcionários:
   STORE = { obras:[{id,nome,db}], ativa, ultimoBackup }
   db    = { config{fases[],precos,...}, workers[{nome}], zones[], ausencias[], roles{}, ... }
   ausencias = MAPA DE TRABALHO: {nome, dia:'AAAA-MM-DD', tipo:'trabalho'|'ferias'|'faltas', fase:'F1'}
   Exporta JSON com a chave constroii_es_func_multi_v3 -> importa direto na app Funcionários.
   ========================================================================= */

const KEY_MULTI = 'constroii_es_func_multi_v3';     // mesma chave da app Funcionários (p/ exportar)
const KEY_LOCAL = 'constroii_es_chefe_v1';          // cache local desta app

/* ============================ ARQUIVO DE FOTOS (IndexedDB) ============================ */
// As fotos vão para IndexedDB (aguenta muito mais que o localStorage), comprimidas em JPEG.
const FOTO_DB='constroii_chefe_fotos', FOTO_STORE='fotos';
let _fdb=null;
function fotoDB(){
  return new Promise((res,rej)=>{
    if(_fdb) return res(_fdb);
    const r=indexedDB.open(FOTO_DB,1);
    r.onupgradeneeded=e=>{ const db=e.target.result; if(!db.objectStoreNames.contains(FOTO_STORE)) db.createObjectStore(FOTO_STORE,{keyPath:'id'}); };
    r.onsuccess=e=>{ _fdb=e.target.result; res(_fdb); };
    r.onerror=e=>rej(e);
  });
}
async function fotoGuardar(reg){ const db=await fotoDB(); return new Promise((res,rej)=>{ const tx=db.transaction(FOTO_STORE,'readwrite'); tx.objectStore(FOTO_STORE).put(reg); tx.oncomplete=()=>res(reg); tx.onerror=e=>rej(e); }); }
async function fotoApagar(id){ const db=await fotoDB(); return new Promise((res,rej)=>{ const tx=db.transaction(FOTO_STORE,'readwrite'); tx.objectStore(FOTO_STORE).delete(id); tx.oncomplete=()=>res(); tx.onerror=e=>rej(e); }); }
async function fotoListar(tipo){ const db=await fotoDB(); return new Promise((res,rej)=>{ const tx=db.transaction(FOTO_STORE,'readonly'); const req=tx.objectStore(FOTO_STORE).getAll(); req.onsuccess=()=>{ let l=req.result||[]; if(tipo) l=l.filter(x=>x.tipo===tipo); l.sort((a,b)=>(b.data||'').localeCompare(a.data||'')||b.id-a.id); res(l); }; req.onerror=e=>rej(e); }); }
async function fotoApagarTudo(){ try{ const db=await fotoDB(); return new Promise((res)=>{ const tx=db.transaction(FOTO_STORE,'readwrite'); tx.objectStore(FOTO_STORE).clear(); tx.oncomplete=()=>res(); tx.onerror=()=>res(); }); }catch(e){} }
// comprime uma imagem (File) para JPEG ~1280px máx, devolve dataURL
function comprimirImagem(file, maxLado=1280, q=0.72){
  return new Promise((res,rej)=>{
    const img=new Image(); const url=URL.createObjectURL(file);
    img.onload=()=>{
      let {width:w,height:h}=img;
      if(w>h && w>maxLado){ h=Math.round(h*maxLado/w); w=maxLado; }
      else if(h>=w && h>maxLado){ w=Math.round(w*maxLado/h); h=maxLado; }
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      res(cv.toDataURL('image/jpeg',q));
    };
    img.onerror=e=>{ URL.revokeObjectURL(url); rej(e); };
    img.src=url;
  });
}


// ---- semente mínima (caso não haja dados carregados): obras e equipa atuais ----
const SEED = {
  obras:[
    {id:'segovia1', nome:'SEGOVIA_1_92_VIVENDAS'},
    {id:'obra1781632576049', nome:'SEGOVIA_2_RESIDENCIA_EST'},
    {id:'obra1781800099368', nome:'SEGOVIA_0_ALBERTO'}
  ],
  workers:['MAIKER','ANTONIO','NEIVANDER','LIONALDO','LEOMILDO'],
  fases:[
    {id:'F1',nome:'EPS',cor:'#E8650D'},
    {id:'F2',nome:'BARRAMENTO',cor:'#1F7A4D'},
    {id:'F3',nome:'PINTURA',cor:'#3D5A99'},
    {id:'F4',nome:'FASE 4',cor:'#9B287B',ativa:false},
    {id:'F5',nome:'FASE 5',cor:'#0E7C7B',ativa:false},
    {id:'F6',nome:'FASE 6',cor:'#B8860B',ativa:false}
  ],
  precos:{F1:7,F2:6,F3:4.5,HORAS:12}
};

function novaObraDB(nome){
  return {
    config:{obra:nome||'', cliente:'', orcamento:0,
      fases:JSON.parse(JSON.stringify(SEED.fases)),
      precos:JSON.parse(JSON.stringify(SEED.precos)), pctChefe:0, pctServente:0, pctRetencao:0},
    workers:[], roles:{}, payments:[], zones:[],
    extras:[], ausencias:[], prodReg:{}, nextZoneId:1, nextExtraId:1, nextPayId:1, histCfg:[]
  };
}
// cria uma obra nova do zero e torna-a ativa
function criarObra(nome){
  nome=(nome||'').trim(); if(!nome) return false;
  const id='obra'+Date.now();
  STORE.obras.push({id, nome, db:novaObraDB(nome)});
  STORE.ativa=id;
  // os funcionários da equipa global passam a constar na obra (todos em todas as obras)
  garantirEquipaGlobal();
  const db=novaObraDBref(id); if(db) db.workers=STORE.equipaGlobal.map(w=>({nome:w.nome}));
  saveLocal();
  return true;
}
function novaObraDBref(id){ const o=STORE.obras.find(x=>x.id===id); return o?o.db:null; }
// eliminar uma obra inteira
function eliminarObra(id){
  STORE.obras=STORE.obras.filter(o=>o.id!==id);
  if(STORE.ativa===id) STORE.ativa = STORE.obras[0] ? STORE.obras[0].id : null;
  saveLocal();
}
function storeInicial(){
  // a app arranca VAZIA — cada chefe cria/carrega as suas obras
  return { obras:[], ativa:null, equipaGlobal:[], faturas:[], ultimoBackup:null };
}

// estado completamente vazio (sem obras) — usado pelo "Limpar esta app"
function storeVazio(){ return { obras:[], ativa:null, equipaGlobal:[], faturas:[], ultimoBackup:null }; }

let STORE = storeInicial();
let tab='auto';
let chefe = '';            // nome do chefe de grupo (para o registo)
let editZona=null;         // 'new' ou id
let autoMesAberto={};      // mk -> true/false (true = aberto); por defeito aberto
let mapSel=null;           // seleção atual no mapa: 'fase:F1' | 'ferias' | 'faltas' | 'apagar'
let mesesExtra=[];         // meses adicionados manualmente ao mapa (ex: férias futuras)
let resumoScope='obra';    // 'obra' | 'todas'
let fatFiltro='todas';     // filtro da aba faturas: 'todas' | 'paga' | 'pendente'

/* ---------- carregar/guardar localmente ---------- */
function loadLocal(){
  try{ const v=localStorage.getItem(KEY_LOCAL); if(v){ const o=JSON.parse(v); if(o.STORE) STORE=o.STORE; if(o.chefe) chefe=o.chefe; } }catch(e){}
}
function saveLocal(){
  try{ localStorage.setItem(KEY_LOCAL, JSON.stringify({STORE, chefe})); }catch(e){}
}

/* ---------- helpers de modelo ---------- */
function temObras(){ return STORE.obras && STORE.obras.length>0; }
function obraAtiva(){ return STORE.obras.find(o=>o.id===STORE.ativa) || STORE.obras[0] || null; }
function DB(){ const o=obraAtiva(); return o?o.db:{config:{fases:[],precos:{}},workers:[],zones:[],ausencias:[],extras:[],roles:{}}; }
// garante fases só quando a obra não traz nenhuma (não polui obras que já têm a sua config de fases)
function garantirFases(db){
  if(!db.config) db.config={};
  if(!Array.isArray(db.config.fases)) db.config.fases=[];
  if(!db.config.precos) db.config.precos={};
  // se a obra já tem fases definidas (vieram do ficheiro ou da semente), respeita-as tal como estão
  if(db.config.fases.length) return;
  // obra sem fases: aplica as fases padrão (F1-F6, com F4-F6 inativas), iguais à app Funcionários
  db.config.fases = JSON.parse(JSON.stringify(SEED.fases));
  SEED.fases.forEach(sf=>{ if(db.config.precos[sf.id]==null && SEED.precos[sf.id]!=null) db.config.precos[sf.id]=SEED.precos[sf.id]; });
}
function garantirFasesTodas(){ STORE.obras.forEach(o=>garantirFases(o.db)); }
function fasesObra(){ const f=DB().config.fases||[]; return f.filter(x=>x.ativa!==false); }
function faseNome(id){ const f=(DB().config.fases||[]).find(x=>x.id===id); return f?f.nome:id; }
function faseCor(id){ const f=(DB().config.fases||[]).find(x=>x.id===id); return f?f.cor:'#777'; }
function faseLetra(id){ const FS=fasesObra(); const i=FS.findIndex(f=>f.id===id); return i>=0?String(i+1):(id?id.replace(/\D/g,''):'?'); }
function precoFasePadrao(id){ return (DB().config.precos&&DB().config.precos[id]!=null)?DB().config.precos[id]:0; }

// TODOS os funcionários de todas as obras (lista global)
// ===== EQUIPA GLOBAL (única para todas as obras) =====
// inicializa STORE.equipaGlobal a partir dos funcionários/cargos existentes (1ª vez)
function garantirEquipaGlobal(){
  if(!Array.isArray(STORE.equipaGlobal)) STORE.equipaGlobal=[];
  if(STORE.equipaGlobal.length) return;
  if(!temObras()) return; // app vazia: não semear nada
  const mapa={};  // nome -> cargo
  STORE.obras.forEach(o=>{
    (o.db.workers||[]).forEach(w=>{ if(!(w.nome in mapa)) mapa[w.nome]=''; });
    const r=o.db.roles||{}; const meses=Object.keys(r).sort();
    Object.keys(mapa).forEach(nome=>{
      if(mapa[nome]) return;
      for(let i=meses.length-1;i>=0;i--){ const v=r[meses[i]]&&r[meses[i]][nome]; if(v){ mapa[nome]=v; break; } }
    });
  });
  STORE.equipaGlobal = Object.keys(mapa).sort().map(nome=>({nome, cargo:mapa[nome]||'OFICIAL'}));
}
function todosFuncionarios(){ garantirEquipaGlobal(); return STORE.equipaGlobal.map(w=>w.nome).sort(); }
// todos estão em todas as obras: a equipa da obra = equipa global
function equipaObra(){ garantirEquipaGlobal(); return STORE.equipaGlobal.map(w=>w.nome).sort(); }
function estaNaObra(nome){ return true; }
function cargoFunc(nome){ garantirEquipaGlobal(); const w=STORE.equipaGlobal.find(x=>x.nome===nome); return w?w.cargo:''; }
function setCargo(nome, cargo){
  garantirEquipaGlobal();
  const w=STORE.equipaGlobal.find(x=>x.nome===nome);
  if(w) w.cargo=cargo; else STORE.equipaGlobal.push({nome,cargo});
  STORE.equipaGlobal.sort((a,b)=>a.nome<b.nome?-1:1);
  saveLocal();
}
function adicionarFuncionario(nome, cargo){
  garantirEquipaGlobal();
  if(!STORE.equipaGlobal.some(x=>x.nome===nome)){ STORE.equipaGlobal.push({nome,cargo:cargo||'OFICIAL'}); STORE.equipaGlobal.sort((a,b)=>a.nome<b.nome?-1:1); saveLocal(); }
}
function removerFuncionario(nome){
  garantirEquipaGlobal();
  STORE.equipaGlobal=STORE.equipaGlobal.filter(x=>x.nome!==nome); saveLocal();
}
// propaga a equipa global para workers+roles de cada obra (chamado antes de exportar/guardar)
function sincronizarEquipaNasObras(){
  garantirEquipaGlobal();
  STORE.obras.forEach(o=>{
    const db=o.db;
    db.workers = STORE.equipaGlobal.map(w=>({nome:w.nome}));
    if(!db.roles) db.roles={};
    const meses=new Set(Object.keys(db.roles)); meses.add(mesAtual());
    meses.forEach(m=>{ if(!db.roles[m]) db.roles[m]={}; STORE.equipaGlobal.forEach(w=>{ db.roles[m][w.nome]=w.cargo; }); });
  });
}

function hojeISO(){ const d=new Date(),p=n=>String(n).padStart(2,'0'); return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate()); }
function mesAtual(){ return hojeISO().slice(0,7); }
function mesLbl(ym){ if(!ym) return '—'; const [a,m]=ym.split('-'); const M=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez']; return M[(+m)-1]+' '+a; }
function mesCurto(ym){ const [a,m]=ym.split('-'); return ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'][(+m)-1]+'/'+a.slice(2); }
function fmtN(n){ return (Math.round((+n||0)*100)/100).toLocaleString('pt-PT'); }
function fmtEur(n){ return (Math.round((+n||0)*100)/100).toLocaleString('pt-PT',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'; }
// valor concluído de uma zona (fases com mês) e valor pendente (fases por fazer, não anuladas)
function precoZona(z,fid){ return (z.precos&&z.precos[fid]!=null)?z.precos[fid]:precoFasePadrao(fid); }
function zonaValor(z){ if(z.anulada) return 0; const FS=fasesObra(); return FS.reduce((a,f)=>{ const fd=z.fases&&z.fases[f.id]; return a+(fd&&fd.mes? (+z.area||0)*(fd.preco!=null?fd.preco:precoZona(z,f.id)) : 0); },0); }
function zonaPendente(z){ if(z.anulada) return 0; const FS=fasesObra(); return FS.reduce((a,f)=>{ const fd=z.fases&&z.fases[f.id]; const porFazer = !fd || (!fd.mes && !fd.anulada); return a+(porFazer? (+z.area||0)*(precoZona(z,f.id)||0) : 0); },0); }
function diasNoMes(ym){ const [y,m]=ym.split('-').map(Number); return new Date(y,m,0).getDate(); }

// ===== Feriados de Segovia (Espanha) =====
// Fixos nacionais/autonómicos que se repetem todos os anos (MM-DD)
const FERIADOS_FIXOS={
  '01-01':'Año Nuevo','01-06':'Reyes','04-23':'Día de Castilla y León','05-01':'Día del Trabajo',
  '06-29':'San Pedro','08-15':'Asunción','10-12':'Fiesta Nacional','11-01':'Todos los Santos',
  '10-25':'San Frutos','12-06':'Constitución','12-08':'Inmaculada','12-25':'Navidad'
};
// Específicos por ano (datas móveis: Semana Santa, e traslados de fim-de-semana)
const FERIADOS_ANO={
  '2026':{
    '2026-01-01':'Año Nuevo','2026-01-06':'Reyes','2026-04-02':'Jueves Santo','2026-04-03':'Viernes Santo',
    '2026-04-23':'Día de Castilla y León','2026-05-01':'Día del Trabajo','2026-06-29':'San Pedro',
    '2026-08-15':'Asunción','2026-10-12':'Fiesta Nacional','2026-11-02':'San Frutos (traslado)',
    '2026-11-09':'Todos los Santos (traslado)','2026-12-08':'Inmaculada','2026-12-14':'Constitución (traslado)','2026-12-25':'Navidad'
  },
  '2025':{
    '2025-01-01':'Año Nuevo','2025-01-06':'Reyes','2025-04-17':'Jueves Santo','2025-04-18':'Viernes Santo',
    '2025-04-23':'Día de Castilla y León','2025-05-01':'Día del Trabajo','2025-06-29':'San Pedro',
    '2025-08-15':'Asunción','2025-10-12':'Fiesta Nacional','2025-10-25':'San Frutos','2025-11-01':'Todos los Santos',
    '2025-12-06':'Constitución','2025-12-08':'Inmaculada','2025-12-25':'Navidad'
  }
};
function feriadoNome(ymd){
  const ano=ymd.slice(0,4);
  if(FERIADOS_ANO[ano]) return FERIADOS_ANO[ano][ymd]||null;   // ano com lista exata
  return FERIADOS_FIXOS[ymd.slice(5)]||null;                   // fallback: fixos que se repetem
}
function ehFeriado(ymd){ return !!feriadoNome(ymd); }

function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),2200); }
function abrirFotoGrande(src){
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(10,12,14,.92);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px';
  ov.innerHTML=`<img src="${src}" style="max-width:100%;max-height:100%;border-radius:8px"><button style="position:absolute;top:14px;right:16px;background:#fff;border:none;border-radius:50%;width:40px;height:40px;font-size:20px;font-weight:800">✕</button>`;
  ov.onclick=()=>ov.remove();
  document.body.appendChild(ov);
}

/* ============================ AUTO ============================ */
function rAuto(){
  const db=DB(); const FS=fasesObra();
  if(editZona!==null) return rFormZona();

  let h='';
  if(!equipaObra().length){
    h+=`<div class="banner warm">Esta obra ainda não tem equipa afeta. Toca em <b>👷 Equipa</b> (em cima) e marca quem trabalha aqui — depois podes lançar o auto.</div>`;
  }
  const zonas=(db.zones||[]).slice();
  if(!zonas.length){
    h+=`<div class="big"><div class="empty"><span class="emoji">📐</span>Ainda não lançaste nenhuma zona no auto.</div><button class="act" id="bNovaZonaTop" style="width:100%;padding:14px;font-size:15px">＋ Nova zona</button></div>`;
    return h;
  }

  // agrupar por mês do auto
  const grupos={}, ordem=[];
  zonas.forEach(z=>{ const mk=(z.dataAuto||'').slice(0,7)||'sem'; if(!grupos[mk]){grupos[mk]=[];ordem.push(mk);} grupos[mk].push(z); });
  ordem.sort((a,b)=>a<b?-1:a>b?1:0);

  const aberto=(mk)=> autoMesAberto[mk]!==false; // default aberto
  const algumFechado = ordem.some(mk=>!aberto(mk));

  h+=`<div class="big">`;
  h+=`<div class="bar" style="margin:0 0 10px;gap:6px">
    <button class="act" id="bNovaZonaTop" style="flex:1 1 100%;padding:14px;font-size:15px">＋ Nova zona</button>
    <button class="sec" id="bAutoToggleAll" style="font-size:12px">${algumFechado?'▼ Abrir meses':'▲ Fechar meses'}</button>
    <span class="note" style="margin:0;flex:1">${ordem.length} ${ordem.length==1?'mês':'meses'} de auto · clica no mês para abrir/fechar</span>
  </div>`;

  h+=`<div class="scroll"><table><tr><th>Zona</th><th>Data auto</th><th class="n">m²</th>${FS.map(f=>`<th>${faseNome(f.id)}</th>`).join('')}<th></th></tr>`;

  const chip=(z,f)=>{
    const fd=z.fases&&z.fases[f.id];
    if(fd&&fd.anulada) return `<button class="mini" data-toggleanul="${z.id}|${f.id}" title="Fase anulada — toca para reativar" style="color:var(--ink2);font-size:10.5px;text-decoration:line-through">anulada</button>`;
    if(fd&&fd.mes) return `<span style="display:inline-flex;gap:2px;align-items:center"><span class="tagF" title="${(fd.equipa||[]).join(', ')}" style="background:${faseCor(f.id)}22;color:${faseCor(f.id)};font-weight:700;font-size:10px;padding:1px 6px;border-radius:4px">${fd.mes.slice(5)}/${fd.mes.slice(2,4)}</span><button class="mini" data-toggleanul="${z.id}|${f.id}" title="Anular esta fase concluída" style="font-size:10px;color:var(--ink2);padding:0 2px">✕</button></span>`;
    return `<span style="display:inline-flex;gap:3px;align-items:center"><button class="mini" data-zedit="${z.id}" style="color:var(--verm);font-size:11px;font-weight:700">pend.</button><button class="mini" data-toggleanul="${z.id}|${f.id}" title="Anular esta fase (não se faz)" style="font-size:11px;color:var(--ink2)">✕</button></span>`;
  };

  let sA=0,nZonas=0;
  ordem.forEach(mk=>{
    const zs=grupos[mk];
    let gA=0; zs.forEach(z=>{ gA+=z.anulada?0:(+z.area||0); });
    // m² concluídos por fase
    const gFase={}; FS.forEach(f=>gFase[f.id]=0);
    zs.forEach(z=>{ if(z.anulada)return; FS.forEach(f=>{ const fd=z.fases&&z.fases[f.id]; if(fd&&!fd.anulada&&fd.mes) gFase[f.id]+=(+z.area||0); }); });
    const fasesTxt=FS.filter(f=>gFase[f.id]>0.01).map(f=>`<span style="color:${faseCor(f.id)};font-weight:700">${faseNome(f.id)} ${fmtN(gFase[f.id])} m²</span>`).join(' · ');
    // m² anulados por fase
    const anFase={}; FS.forEach(f=>anFase[f.id]=0);
    zs.forEach(z=>{ FS.forEach(f=>{ const fd=z.fases&&z.fases[f.id]; if(z.anulada || (fd&&fd.anulada)) anFase[f.id]+=(+z.area||0); }); });
    const anulTxt=FS.filter(f=>anFase[f.id]>0.01).map(f=>`${faseNome(f.id)} ${fmtN(anFase[f.id])} m²`).join(' · ');

    const fechado=!aberto(mk);
    const lblMes = mk==='sem' ? 'Sem data de auto' : 'Auto '+mesLbl(mk);
    const mesCompleto = zs.length>0 && zs.every(z=> z.anulada || FS.every(f=>{ const fd=z.fases&&z.fases[f.id]; return fd && (fd.anulada || fd.mes); }));
    const bgMes = mesCompleto ? '#D6F0E2' : '#F0F7F3';

    h+=`<tr class="gmes" data-gmes="${mk}" style="cursor:pointer;background:${bgMes}"><td colspan="${3+FS.length+1}" style="font-weight:800"><span style="display:inline-block;width:14px">${fechado?'▶':'▼'}</span>${mesCompleto?'<span style="color:var(--verde)">✓ </span>':''}${lblMes} <span style="font-weight:500;color:var(--ink2);font-size:12px">· ${zs.length} ${zs.length==1?'zona':'zonas'} · ${fmtN(gA)} m²${mesCompleto?' · <span style="color:var(--verde);font-weight:700">concluído</span>':''}</span>${fasesTxt?`<div style="font-weight:500;font-size:11px;margin-top:2px;padding-left:14px">${fasesTxt}</div>`:''}${anulTxt?`<div style="font-weight:500;font-size:11px;margin-top:1px;padding-left:14px;color:var(--ink2)">⊘ Anuladas: ${anulTxt}</div>`:''}</td></tr>`;

    if(!fechado){
      zs.forEach(z=>{
        const ri = z.anulada ? 'opacity:.5;text-decoration:line-through' : '';
        const btnAnulZona = z.anulada
          ? `<button class="mini" data-togglezona="${z.id}" title="Reativar zona" style="color:var(--verde)">↺</button>`
          : `<button class="mini" data-togglezona="${z.id}" title="Anular zona inteira" style="color:var(--ink2)">⊘</button>`;
        h+=`<tr style="${ri}"><td style="padding-left:18px">${z.desc||'(sem nome)'}${z.anulada?' <span style="font-size:9px;color:var(--verm);text-decoration:none">ANULADA</span>':''}</td><td style="font-size:12px;font-family:var(--mono)">${z.dataAuto||'—'}</td><td class="n">${fmtN(z.area)}</td>
        ${FS.map(f=>`<td>${z.anulada?'—':chip(z,f)}</td>`).join('')}
        <td style="text-decoration:none;white-space:nowrap">${btnAnulZona}<button class="mini" data-zedit="${z.id}">✏️</button><button class="mini" data-zdel="${z.id}" style="color:var(--verm)">🗑️</button></td></tr>`;
      });
    }
    sA+=gA; nZonas+=zs.length;
  });

  h+=`<tr style="background:var(--cinza-obra);color:#fff;font-weight:800"><td colspan="2">Total (${nZonas} zonas)</td><td class="n">${fmtN(sA)}</td><td colspan="${FS.length}"></td><td></td></tr>`;
  h+=`</table></div></div>`;
  return h;
}

// ===== Aba HORAS =====
function rHoras(){
  const db=DB();
  const extras=(db.extras||[]).slice();
  const totHoras=extras.reduce((a,e)=>a+(+e.area||0),0);
  const gH={}, ordemH=[];
  extras.forEach(e=>{ const mk=e.mes||'sem'; if(!gH[mk]){gH[mk]=[];ordemH.push(mk);} gH[mk].push(e); });
  ordemH.sort((a,b)=>a<b?1:a>b?-1:0);

  let h=`<div class="big"><div class="titulo">Horas avulsas${totHoras>0?` · ${fmtN(totHoras)} h no total`:''}</div>`;
  if(!equipaObra().length){
    h+=`<div class="banner warm">Esta obra ainda não tem equipa afeta. Toca em <b>👷 Equipa</b> (em cima) e marca quem trabalha aqui.</div>`;
  }
  h+=`<div style="background:#F7F9F6;border:1px solid var(--linha);border-radius:10px;padding:11px;margin-bottom:12px">
      <div class="row" style="margin-bottom:8px">
        <label class="field" style="flex:2 1 160px">Descrição<input type="text" id="hDesc" placeholder="ex: Limpeza de obra"></label>
        <label class="field" style="flex:0 1 90px">Horas<input type="number" step="0.5" id="hQtd" placeholder="0"></label>
        <label class="field" style="flex:0 1 110px">Mês<input type="text" id="hMes" value="${mesAtual()}" placeholder="2026-06"></label>
      </div>
      <div class="note" style="margin:2px 0 6px">Quem fez estas horas:</div>
      <div class="chk" id="hEq">${equipaObra().map(n=>`<label><input type="checkbox" value="${n}">${n}</label>`).join('')||'<span style="font-size:12px;color:var(--verm)">⚠ Marca a equipa da obra primeiro.</span>'}</div>
      <button class="act" id="bRegHoras" style="width:100%;margin-top:10px">＋ Registar horas</button>
    </div>`;

  if(!extras.length){
    h+=`<div class="empty" style="padding:14px"><span class="emoji" style="font-size:24px">⏱️</span>Sem registos de horas.</div>`;
  } else {
    ordemH.forEach(mk=>{
      const lst=gH[mk]; const sub=lst.reduce((a,e)=>a+(+e.area||0),0);
      h+=`<div style="margin-bottom:10px">
        <div style="font-weight:800;font-size:12px;color:var(--ink2);text-transform:uppercase;letter-spacing:.04em;margin:4px 0 6px;display:flex;justify-content:space-between;align-items:center">
          <span>${mk==='sem'?'Sem mês':mesLbl(mk)}</span><span style="font-family:var(--mono);color:var(--verde-esc)">${fmtN(sub)} h</span>
        </div>`;
      lst.forEach(e=>{
        h+=`<div style="display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--linha);border-radius:9px;padding:9px 11px;margin-bottom:6px">
          <div style="font-family:var(--mono);font-weight:800;font-size:16px;color:var(--verde-esc);min-width:52px;text-align:center;background:#E2F2EC;border-radius:7px;padding:6px 4px">${fmtN(e.area)}<span style="font-size:9px;font-weight:600;display:block;color:var(--ink2)">horas</span></div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:700;font-size:13px">${e.desc||'(sem descrição)'}</div>
            ${(e.equipa&&e.equipa.length)?`<div style="font-size:11px;color:var(--ink2);margin-top:1px">👷 ${e.equipa.join(', ')}</div>`:''}
          </div>
          <button class="mini" data-delh="${e.id}" style="color:var(--verm);font-size:16px">🗑️</button>
        </div>`;
      });
      h+=`</div>`;
    });
  }
  h+=`</div>`;
  return h;
}

function rFormZona(){
  const db=DB(); const FS=fasesObra();
  const novo = editZona==='new';
  const z = novo ? {desc:'',comp:'',alt:'',area:'',dataAuto:hojeISO(),fases:{}} : db.zones.find(x=>x.id===editZona);
  const eqObra=equipaObra();
  let h=`<div class="big"><div class="titulo">${novo?'Nova zona do auto':'Editar zona'}</div>
    <div class="row">
      <label class="field" style="flex:1 1 100%">Descrição da zona<input type="text" id="zDesc" value="${z.desc||''}" placeholder="ex: FACHADA PRINCIPAL"></label>
    </div>
    <div class="row">
      <label class="field">Comprimento<input type="number" step="0.01" id="zComp" value="${z.comp||''}" placeholder="0"></label>
      <label class="field">Altura<input type="number" step="0.01" id="zAlt" value="${z.alt||''}" placeholder="0"></label>
      <label class="field">Área m²<input type="number" step="0.001" id="zArea" value="${z.area||''}" placeholder="0"></label>
    </div>
    <div class="note" style="margin-top:-4px">Se preencheres comprimento × altura, a área calcula-se sozinha. Senão escreve a área direta.</div>

    </div>`;

  if(!eqObra.length){
    h+=`<div class="banner warm" style="margin:8px 0">Sem equipa afeta a esta obra — marca a equipa primeiro em <b>👷 Equipa</b>.</div>`;
  }
  h+=`<hr class="sep"><div class="note" style="margin-top:0"><b>Fases feitas nesta zona.</b> Liga as que já estão concluídas, escolhe o mês e quem trabalhou.</div>`;
  FS.forEach(f=>{
    const fd=(z.fases&&z.fases[f.id])||null;
    const on=!!(fd&&fd.mes);
    const preco = fd&&fd.preco!=null ? fd.preco : precoFasePadrao(f.id);
    const mes = fd&&fd.mes ? fd.mes : mesAtual();
    const eq = (fd&&fd.equipa)||eqObra.slice();

/* ============================ RESUMO (m² por fase / mês) ============================ */
function rResumo(){
  if(resumoScope==='todas') return rResumoTodas();
  return rResumoObra();
}
function rResumoObra(){
  const db=DB(); const FS=fasesObra();
  // recolher: mes -> {faseId: m²}  (fases concluídas, zona não anulada)
  const porMes={};      // m² por fase
  const valMes={};      // valor € por fase (área × preço da fase)
  (db.zones||[]).forEach(z=>{
    if(z.anulada) return;
    const area=+z.area||0;
    FS.forEach(f=>{
      const fd=z.fases&&z.fases[f.id];
      if(fd&&fd.mes&&!fd.anulada){
        const ym=fd.mes;
        (porMes[ym]=porMes[ym]||{})[f.id]=(porMes[ym][f.id]||0)+area;
        (valMes[ym]=valMes[ym]||{})[f.id]=(valMes[ym][f.id]||0)+area*(fd.preco!=null?fd.preco:precoFasePadrao(f.id));
      }
    });
  });
  const meses=Object.keys(porMes).sort();
  if(!meses.length){
    return `<div class="big"><div class="empty"><span class="emoji">📊</span>Ainda não há fases concluídas para resumir.<br>Lança zonas no <b>Auto</b> e marca as fases feitas.</div></div>`;
  }

  // totais globais por fase + total geral
  const totFase={}; FS.forEach(f=>totFase[f.id]=0);
  const totValFase={}; FS.forEach(f=>totValFase[f.id]=0);
  meses.forEach(ym=>FS.forEach(f=>{ totFase[f.id]+=(porMes[ym][f.id]||0); totValFase[f.id]+=(valMes[ym][f.id]||0); }));
  const totGeral=FS.reduce((s,f)=>s+totFase[f.id],0);
  const totValGeral=FS.reduce((s,f)=>s+totValFase[f.id],0);

  // horas avulsas (total para o cartão ao lado das fases)
  const extrasR=(db.extras||[]);
  const totHorasR=extrasR.reduce((a,e)=>a+(+e.area||0),0);

  let h=`<div class="big"><div class="titulo">Total trabalho concluído por fase — ${obraAtiva().nome}</div>
    <div class="note" style="margin-top:0">m² de cada fase dados como concluídos, por mês do auto.</div>
    <div class="cards" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:8px 0 4px">
      ${FS.map(f=>`<div style="background:${faseCor(f.id)}14;border:1px solid ${faseCor(f.id)}44;border-radius:10px;padding:10px 12px">
        <div style="font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;font-weight:800;color:${faseCor(f.id)}">${faseNome(f.id)}</div>
        <div style="font-family:var(--mono);font-size:20px;font-weight:800;margin-top:2px">${fmtN(totFase[f.id])}<span style="font-size:12px;font-weight:600;color:var(--ink2)"> m²</span></div>
      </div>`).join('')}
      ${totHorasR>0?`<div style="background:#E2F2EC;border:1px solid #9ED4BE;border-radius:10px;padding:10px 12px">
        <div style="font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;font-weight:800;color:var(--verde-esc)">⏱️ Horas</div>
        <div style="font-family:var(--mono);font-size:20px;font-weight:800;margin-top:2px;color:var(--verde-esc)">${fmtN(totHorasR)}<span style="font-size:12px;font-weight:600;color:var(--ink2)"> h</span></div>
        <div style="font-family:var(--mono);font-size:12px;color:var(--ink2)">avulsas</div>
      </div>`:''}
    </div>
  </div>`;

  // tabela por mês
  h+=`<div class="big"><div class="titulo">Por mês</div>
    <div class="scroll"><table>
      <tr><th>Mês</th>${FS.map(f=>`<th class="n" style="color:${faseCor(f.id)}">${faseNome(f.id)}</th>`).join('')}<th class="n">Total m²</th></tr>`;
  meses.forEach(ym=>{
    let tMes=0; FS.forEach(f=>tMes+=(porMes[ym][f.id]||0));
    h+=`<tr><td><b>${mesLbl(ym)}</b></td>${FS.map(f=>{ const v=porMes[ym][f.id]||0; return `<td class="n">${v?fmtN(v):'—'}</td>`; }).join('')}<td class="n"><b>${fmtN(tMes)}</b></td></tr>`;
  });
  h+=`<tr style="background:#F5F7F4;font-weight:800"><td>Total</td>${FS.map(f=>`<td class="n">${fmtN(totFase[f.id])}</td>`).join('')}<td class="n">${fmtN(totGeral)}</td></tr>`;
  h+=`</table></div>
    <div class="note">Total concluído na obra: <b>${fmtN(totGeral)} m²</b></div>
  </div>`;

  // ===== Total de dias por funcionário (vindo do mapa de trabalho) =====
  const FS2=fasesObra(); const aus=db.ausencias||[];
  const eqNomes=[...new Set(aus.map(a=>a.nome))].sort();
  let temDias=false;
  let tabela=`<div class="big"><div class="titulo">Dias de trabalho por funcionário (mapa de trabalho)</div>
    <div class="scroll"><table><tr><th>Funcionário</th><th>Cargo</th>${FS2.map(f=>`<th class="n" style="color:${faseCor(f.id)}">${faseNome(f.id)}</th>`).join('')}<th class="n">Total</th><th class="n">Férias</th><th class="n">Faltas</th></tr>`;
  const corCargo={CHEFE:'#C45104',OFICIAL:'#1F7A4D',SERVENTE:'#5A636B'};
  const lblCargo={CHEFE:'Chefe',OFICIAL:'Oficial',SERVENTE:'Servente'};
  eqNomes.forEach(nome=>{
    const cf={}; FS2.forEach(f=>cf[f.id]=0); let nFer=0,nFal=0;
    aus.forEach(a=>{ if(a.nome!==nome)return; if(a.tipo==='trabalho')cf[a.fase||FS2[0].id]=(cf[a.fase||FS2[0].id]||0)+1; else if(a.tipo==='ferias')nFer++; else if(a.tipo==='faltas')nFal++; });
    const tot=FS2.reduce((s,f)=>s+cf[f.id],0); if(tot===0&&!nFer&&!nFal) return;
    temDias=true;
    const cg=cargoFunc(nome)||'OFICIAL';
    tabela+=`<tr><td><b>${nome}</b></td><td><span style="font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px;background:${(corCargo[cg]||'#777')}22;color:${corCargo[cg]||'#777'}">${lblCargo[cg]||cg}</span></td>${FS2.map(f=>`<td class="n">${cf[f.id]||'—'}</td>`).join('')}<td class="n"><b>${tot||'—'}</b></td><td class="n">${nFer||'—'}</td><td class="n">${nFal||'—'}</td></tr>`;
  });
  tabela+=`</table></div></div>`;
  if(temDias) h+=tabela;

  return h;
}
function rResumoTodas(){
  // chave de fase = nome normalizado (junta EPS de obras diferentes mesmo com ids diferentes)
  const norm=s=>(s||'').trim().toUpperCase();
  const faseInfo={};        // nomeNorm -> {label, cor}
  const ordemFase=[];       // ordem de 1º aparecimento
  const porObra={};         // obraNome -> {faseNorm: m²}
  const porObraVal={};      // obraNome -> {faseNorm: €}
  const porMes={};          // ym -> {faseNorm: m²}
  let totGeral=0, totValGeral=0;

  STORE.obras.forEach(o=>{
    const db=o.db; const fases=(db.config.fases||[]).filter(f=>f.ativa!==false);
    porObra[o.nome]=porObra[o.nome]||{}; porObraVal[o.nome]=porObraVal[o.nome]||{};
    (db.zones||[]).forEach(z=>{
      if(z.anulada) return;
      const area=+z.area||0;
      fases.forEach(f=>{
        const fd=z.fases&&z.fases[f.id];
        if(fd&&fd.mes&&!fd.anulada){
          const key=norm(f.nome);
          if(!faseInfo[key]){ faseInfo[key]={label:f.nome,cor:f.cor||'#777'}; ordemFase.push(key); }
          const preco=fd.preco!=null?fd.preco:((db.config.precos||{})[f.id]||0);
          porObra[o.nome][key]=(porObra[o.nome][key]||0)+area;
          porObraVal[o.nome][key]=(porObraVal[o.nome][key]||0)+area*preco;
          (porMes[fd.mes]=porMes[fd.mes]||{})[key]=(porMes[fd.mes][key]||0)+area;
          totGeral+=area; totValGeral+=area*preco;
        }
      });
    });
  });

  const fkeys=ordemFase;
  if(!fkeys.length){
    return `<div class="big"><div class="empty"><span class="emoji">📊</span>Ainda não há fases concluídas em nenhuma obra.</div></div>`;
  }
  const cor=k=>faseInfo[k].cor, lbl=k=>faseInfo[k].label;
  const totFase={}; fkeys.forEach(k=>totFase[k]=0);
  Object.values(porObra).forEach(ob=>fkeys.forEach(k=>totFase[k]+=(ob[k]||0)));

  // cartões globais por fase
  let h=`<div class="big"><div class="titulo">Trabalho concluído — todas as obras</div>
    <div class="note" style="margin-top:0">Soma de todas as obras. As fases com o mesmo nome juntam-se (ex.: EPS de obras diferentes).</div>
    <div class="cards" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:8px 0 4px">
      ${fkeys.map(k=>`<div style="background:${cor(k)}14;border:1px solid ${cor(k)}44;border-radius:10px;padding:10px 12px">
        <div style="font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;font-weight:800;color:${cor(k)}">${lbl(k)}</div>
        <div style="font-family:var(--mono);font-size:20px;font-weight:800;margin-top:2px">${fmtN(totFase[k])}<span style="font-size:12px;font-weight:600;color:var(--ink2)"> m²</span></div>
      </div>`).join('')}
      <div style="background:var(--cinza-obra);color:#fff;border-radius:10px;padding:10px 12px">
        <div style="font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;font-weight:800;opacity:.85">Total</div>
        <div style="font-family:var(--mono);font-size:20px;font-weight:800;margin-top:2px">${fmtN(totGeral)}<span style="font-size:12px;font-weight:600;opacity:.8"> m²</span></div>
      </div>
    </div>
  </div>`;

  // por obra
  h+=`<div class="big"><div class="titulo">Por obra</div>
    <div class="scroll"><table><tr><th>Obra</th>${fkeys.map(k=>`<th class="n" style="color:${cor(k)}">${lbl(k)}</th>`).join('')}<th class="n">Total m²</th></tr>`;
  STORE.obras.forEach(o=>{
    const ob=porObra[o.nome]||{};
    let tm=0; fkeys.forEach(k=>{ tm+=(ob[k]||0); });
    if(tm===0) return;
    h+=`<tr><td><b>${o.nome}</b></td>${fkeys.map(k=>{ const v=ob[k]||0; return `<td class="n">${v?fmtN(v):'—'}</td>`; }).join('')}<td class="n"><b>${fmtN(tm)}</b></td></tr>`;
  });
  h+=`<tr style="background:#F5F7F4;font-weight:800"><td>Total</td>${fkeys.map(k=>`<td class="n">${fmtN(totFase[k])}</td>`).join('')}<td class="n">${fmtN(totGeral)}</td></tr>`;
  h+=`</table></div></div>`;

  // por mês (todas as obras juntas)
  const meses=Object.keys(porMes).sort();
  h+=`<div class="big"><div class="titulo">Por mês (todas as obras)</div>
    <div class="scroll"><table><tr><th>Mês</th>${fkeys.map(k=>`<th class="n" style="color:${cor(k)}">${lbl(k)}</th>`).join('')}<th class="n">Total m²</th></tr>`;
  meses.forEach(ym=>{
    let tm=0; fkeys.forEach(k=>tm+=(porMes[ym][k]||0));
    h+=`<tr><td><b>${mesLbl(ym)}</b></td>${fkeys.map(k=>{ const v=porMes[ym][k]||0; return `<td class="n">${v?fmtN(v):'—'}</td>`; }).join('')}<td class="n"><b>${fmtN(tm)}</b></td></tr>`;
  });
  h+=`</table></div>
    <div class="note">Total concluído em todas as obras: <b>${fmtN(totGeral)} m²</b></div>
  </div>`;
  return h;
}

/* ============================ MAPA DE TRABALHO ============================ */
function rMapa(){
  const db=DB(); const FS=fasesObra();
  if(!db.ausencias) db.ausencias=[];
  const eq=equipaObra();
  let h='';
  if(!eq.length){
    return `<div class="big"><div class="empty"><span class="emoji">📅</span>Sem equipa afeta a esta obra.<br>Marca quem trabalha aqui em <b>👷 Equipa</b> para usar o mapa.</div></div>`;
  }
  const TIPOS={ferias:{lbl:'Férias',cor:'#C9A227'},faltas:{lbl:'Faltas',cor:'#C0392B'}};
  let sel = mapSel || ('fase:'+(FS[0]?FS[0].id:'F1'));
  if(sel.startsWith('fase:') && !FS.some(f=>f.id===sel.slice(5))) sel='fase:'+(FS[0]?FS[0].id:'F1');
  mapSel=sel;

  // meses a mostrar: meses com marcação no auto (fases concluídas) + meses já marcados no mapa + mês atual
  const mesesSet=new Set([mesAtual()]);
  (db.zones||[]).forEach(z=>{ if(z.anulada) return; FS.forEach(f=>{ const fd=z.fases&&z.fases[f.id]; if(fd&&fd.mes&&!fd.anulada) mesesSet.add(fd.mes); }); });
  db.ausencias.forEach(a=>{ if(a.dia) mesesSet.add(a.dia.slice(0,7)); });
  mesesExtra.forEach(m=>mesesSet.add(m));
  const meses=[...mesesSet].filter(Boolean).sort();

  h+=`<div class="big"><div class="titulo">Mapa de trabalho</div>
    <div class="note" style="margin-top:0">Escolhe a <b>fase</b> (ou Férias/Faltas) e <b>toca nos dias</b> de cada pessoa. Toca no <b>número do dia</b> para marcar a equipa toda nesse dia.</div>
    <div class="maptools">
      ${FS.map(f=>{ const v='fase:'+f.id; const c=faseCor(f.id); return `<button data-msel="${v}" style="border-color:${c};${sel===v?`background:${c};color:#fff`:`color:${c}`}">${faseNome(f.id)}</button>`; }).join('')}
      ${Object.keys(TIPOS).map(t=>`<button data-msel="${t}" style="border-color:${TIPOS[t].cor};${sel===t?`background:${TIPOS[t].cor};color:#fff`:`color:${TIPOS[t].cor}`}">${TIPOS[t].lbl}</button>`).join('')}
      <button data-msel="apagar" style="border-color:var(--ink2);${sel==='apagar'?'background:var(--ink2);color:#fff':'color:var(--ink2)'}">🧹 Apagar</button>
    </div>
    <div class="legend">${FS.map(f=>`<span><b style="color:${faseCor(f.id)}">${faseLetra(f.id)}</b> = ${faseNome(f.id)}</span>`).join('')}<span><b style="color:${TIPOS.ferias.cor}">F</b> = Férias</span><span><b style="color:${TIPOS.faltas.cor}">•</b> = Falta</span><span><b style="color:#9aa3a8">↗</b> = noutra obra</span><span><b style="color:#7B3FA0">■</b> = feriado Segovia</span></div>`;

  const ausDia=(nome,ymd)=>db.ausencias.find(a=>a.nome===nome&&a.dia===ymd);
  const corCel=(a)=>{ if(!a)return null; if(a.tipo==='trabalho')return faseCor(a.fase||FS[0].id); return (TIPOS[a.tipo]||{}).cor||'#999'; };
  const letraCel=(a)=>{ if(!a)return ''; if(a.tipo==='trabalho')return faseLetra(a.fase||FS[0].id); return a.tipo==='ferias'?'F':'•'; };

  meses.forEach(ym=>{
    const nd=diasNoMes(ym);
    let diasTrab=0, temMarcacao=false; db.ausencias.forEach(a=>{ if(a.dia&&a.dia.slice(0,7)===ym){ temMarcacao=true; if(a.tipo==='trabalho') diasTrab++; } });
    const ehExtraVazio = mesesExtra.includes(ym) && !temMarcacao;
    h+=`<div class="mapmes" data-mapmes="${ym}"><span id="arr_${ym}">▼</span>${mesLbl(ym)} <span style="font-weight:500;color:var(--ink2);font-size:11px">· ${diasTrab} dias-pessoa</span>${ehExtraVazio?`<button class="mini" data-rmmes="${ym}" title="Anular este mês" style="margin-left:auto;color:#fff;background:var(--verm);border-radius:5px;font-size:11px;font-weight:700;padding:2px 8px;line-height:1.3">✕ anular</button>`:''}</div>`;
    h+=`<div class="mapgrid" id="grid_${ym}"><table><tr><th class="nm">Funcionário</th>`;

      h+=`<th class="dh" data-mapdia="${ymd}" style="background:${bgDia}" title="${fer?'🎉 Feriado: '+fer:'Marcar equipa toda no dia '+d}">${d}</th>`; }
    h+=`</tr>`;
    eq.forEach(nome=>{
      h+=`<tr><td class="nm">${nome}</td>`;
      for(let d=1;d<=nd;d++){ const ymd=ym+'-'+String(d).padStart(2,'0'); const dow=new Date(ymd+'T00:00:00').getDay(); const we=dow===0||dow===6;

      h+=`</tr>`;
    });
    h+=`</table></div>`;
  });
  // seletor de mês no fim — destacado
  const _hoje=hojeISO(); const _anoAt=+_hoje.slice(0,4); const _mesAt=_hoje.slice(5,7);
  const _meses=[['01','Janeiro'],['02','Fevereiro'],['03','Março'],['04','Abril'],['05','Maio'],['06','Junho'],['07','Julho'],['08','Agosto'],['09','Setembro'],['10','Outubro'],['11','Novembro'],['12','Dezembro']];
  const _anos=[]; for(let a=_anoAt-1;a<=_anoAt+2;a++) _anos.push(a);
  h+=`<hr class="sep">
    <div style="background:#FFF7E6;border:1px solid #F0D78A;border-radius:10px;padding:12px">

      <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">
        <span style="font-size:13px;font-weight:700;color:#7a5d12">Mês:</span>
        <select id="mapMesSel" style="flex:0 1 auto;width:auto;padding:8px 9px">${_meses.map(([v,n])=>`<option value="${v}" ${v===_mesAt?'selected':''}>${n}</option>`).join('')}</select>
        <select id="mapAnoSel" style="flex:0 1 auto;width:auto;padding:8px 9px">${_anos.map(a=>`<option value="${a}" ${a===_anoAt?'selected':''}>${a}</option>`).join('')}</select>
        <button class="act lar" id="bAddMes" style="white-space:nowrap;padding:7px 12px;font-size:13px;flex:0 0 auto">＋ Adicionar</button>
      </div>
      <div class="note" style="margin:8px 0 0;color:#8a6d22">Depois escolhe <b>Férias</b> em cima e toca nos dias de cada pessoa.</div>
    </div>`;
  h+=`</div>`;
  return h;
}

/* ============================ FATURAS (lista única global) ============================ */
function garantirFaturas(){ if(!Array.isArray(STORE.faturas)) STORE.faturas=[]; }
function adicionarFatura(f){
  garantirFaturas();
  const id=STORE.faturas.reduce((m,x)=>Math.max(m,x.id||0),0)+1;
  STORE.faturas.push({id, numero:f.numero||'', data:f.data||'', valor:+f.valor||0, desc:f.desc||'', estado:f.estado||'pendente'});
  saveLocal();
}
function removerFatura(id){ garantirFaturas(); STORE.faturas=STORE.faturas.filter(f=>f.id!==id); saveLocal(); }
function alternarEstadoFatura(id){
  garantirFaturas();
  const f=STORE.faturas.find(x=>x.id===id); if(f){ f.estado=(f.estado==='paga'?'pendente':'paga'); saveLocal(); }
}

/* ============================ RENDER ============================ */
function pedirNovaObra(){
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(20,25,28,.55);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px';
  ov.innerHTML=`<div style="background:var(--bg);width:100%;max-width:420px;border-radius:14px;padding:18px">
      <div style="font-weight:800;font-size:15px;margin-bottom:10px">Nova obra</div>
      <input type="text" id="novaObraInp" placeholder="Nome da obra" style="width:100%;text-transform:uppercase" autocomplete="off">
      <div class="bar" style="margin-top:12px;gap:8px">
        <button class="sec" id="novaObraCancel" style="flex:1">Cancelar</button>
        <button class="act" id="novaObraOk" style="flex:1">Criar</button>
      </div>
    </div>`;
  document.body.appendChild(ov);
  const inp=ov.querySelector('#novaObraInp');
  setTimeout(()=>inp.focus(),50);
  const fechar=()=>ov.remove();
  const criar=()=>{
    const nome=(inp.value||'').trim();
    if(!nome){ inp.style.borderColor='var(--verm)'; return; }
    fechar();
    if(criarObra(nome)){ tab='auto'; editZona=null; render(); toast('Obra criada ✓'); }
  };
  ov.querySelector('#novaObraCancel').onclick=fechar;
  ov.querySelector('#novaObraOk').onclick=criar;
  ov.addEventListener('click',e=>{ if(e.target===ov) fechar(); });
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') criar(); });
}
function render(){
  // barra de obras (botões fixos)
  const obraBar=document.getElementById('obraBar');
  const lblObra=(nome)=>{ const m=nome.match(/SEGOVIA[_\s]*(\d+)[_\s]*(.*)/i); if(m) return m[1]+' · '+m[2].replace(/_/g,' ').trim(); return nome.replace(/_/g,' '); };
  obraBar.innerHTML=STORE.obras.map(o=>`<button data-obra="${o.id}" class="${o.id===STORE.ativa?'on':''}" title="${o.nome}">${lblObra(o.nome)}</button>`).join('');
  obraBar.querySelectorAll('[data-obra]').forEach(b=>b.onclick=()=>{ STORE.ativa=b.dataset.obra; editZona=null; mapSel=null; saveLocal(); render(); });
  document.getElementById('whoBox').innerHTML = (chefe?('👤 '+chefe+'<br>'):'') + '<span style="opacity:.7">'+equipaObra().length+' na equipa</span>';

  // nav
  document.querySelectorAll('#nav button').forEach(b=>{
    let act=(b.dataset.t===tab);
    if(b.dataset.t==='resumo' && tab==='resumo' && resumoScope==='todas') act=false; // Geral obras não acende a aba Resumo
    b.classList.toggle('on', act);
  });
  // destacar botões de cabeçalho ativos
  const hbtns={btnEquipa:'equipa',btnFaturas:'faturas',btnArquivo:'arquivo'};
  Object.entries(hbtns).forEach(([id,t])=>{ const b=document.getElementById(id); if(b){ const act=(tab===t); b.style.background=act?'var(--laranja)':'#222d34'; } });
  const bt=document.getElementById('btnTodas'); if(bt){ bt.style.background=(tab==='resumo'&&resumoScope==='todas')?'var(--laranja)':'#222d34'; }

  const m=document.getElementById('main');
  const abasSemObra=['equipa','faturas','arquivo','dados'];
  if(!temObras() && !abasSemObra.includes(tab)){
    m.innerHTML=`<div class="big"><div class="empty" style="padding:24px"><span class="emoji">📭</span>Não há obras nesta app.<br>Cria uma obra nova, ou vai a <b>🔄 Dados</b> para carregar/restaurar dados.</div>
      <button class="act" id="bNovaObraVazio" style="width:100%;margin-top:8px">＋ Criar obra nova</button>
      <button class="sec" id="bIrDados" style="width:100%;margin-top:6px">Ir a Dados</button></div>`;
    const bn=document.getElementById('bNovaObraVazio'); if(bn) bn.onclick=pedirNovaObra;
    const b=document.getElementById('bIrDados'); if(b) b.onclick=()=>{ tab='dados'; render(); };
    const fab0=document.getElementById('fab'); if(fab0) fab0.innerHTML='';
    return;
  }
  if(tab==='auto') m.innerHTML=rAuto();
  else if(tab==='resumo') m.innerHTML=rResumo();
  else if(tab==='horas') m.innerHTML=rHoras();
  else if(tab==='mapa') m.innerHTML=rMapa();
  else if(tab==='arquivo'){ m.innerHTML=rArquivo(); if(arqFotos[arqTipo]===null) carregarArquivo(); }
  else if(tab==='equipa') m.innerHTML=rEquipa();
  else if(tab==='faturas') m.innerHTML=rFaturas();
  else m.innerHTML=rDados();

  // FAB
  const fab=document.getElementById('fab');
  fab.innerHTML='';

  ligar();
}

/* ============================ EVENTOS ============================ */
function ligar(){
  // --- AUTO: lista ---
  const bNovaTop=document.getElementById('bNovaZonaTop');
  if(bNovaTop) bNovaTop.onclick=()=>{ editZona='new'; render(); };
  document.querySelectorAll('[data-zedit]').forEach(b=>b.onclick=(e)=>{ e.stopPropagation(); editZona=+b.dataset.zedit; render(); });
  document.querySelectorAll('[data-zdel]').forEach(b=>b.onclick=(e)=>{
    e.stopPropagation();
    if(!confirm('Apagar esta zona do auto?')) return;
    const id=+b.dataset.zdel; const db=DB(); db.zones=db.zones.filter(z=>z.id!==id); saveLocal(); render(); toast('Zona apagada');
  });
  // anular/reativar uma FASE
  document.querySelectorAll('[data-toggleanul]').forEach(b=>b.onclick=(e)=>{
    e.stopPropagation();
    const [zid,fid]=b.dataset.toggleanul.split('|');
    const db=DB(); const z=db.zones.find(x=>String(x.id)===zid); if(!z) return;
    if(!z.fases) z.fases={};
    const fd=z.fases[fid];
    if(fd&&fd.anulada){ z.fases[fid]=fd.anterior||null; }      // reativar: repõe o estado anterior
    else { z.fases[fid]={anulada:true, anterior:fd||null}; }   // anular: guarda o anterior
    saveLocal(); render(); toast('Fase atualizada');
  });
  // anular/reativar a ZONA inteira
  document.querySelectorAll('[data-togglezona]').forEach(b=>b.onclick=(e)=>{
    e.stopPropagation();
    const id=+b.dataset.togglezona; const db=DB(); const z=db.zones.find(x=>x.id===id); if(!z) return;
    z.anulada=!z.anulada; saveLocal(); render(); toast(z.anulada?'Zona anulada':'Zona reativada');
  });
  // abrir/fechar mês
  document.querySelectorAll('[data-gmes]').forEach(tr=>tr.onclick=()=>{ const mk=tr.getAttribute('data-gmes'); autoMesAberto[mk]=(autoMesAberto[mk]===false); render(); });
  // abrir/fechar todos
  const bAll=document.getElementById('bAutoToggleAll');
  if(bAll) bAll.onclick=()=>{
    const db=DB(); const mks=[...new Set((db.zones||[]).map(z=>(z.dataAuto||'').slice(0,7)||'sem'))];
    const algumFechado=mks.some(mk=>autoMesAberto[mk]===false);
    mks.forEach(mk=>autoMesAberto[mk]=algumFechado?true:false); // se algum fechado -> abre todos; senão fecha todos
    render();
  };
  // registar horas

function guardarZona(){
  const db=DB(); const FS=fasesObra();
  const desc=(document.getElementById('zDesc').value||'').trim();
  let comp=parseFloat(document.getElementById('zComp').value)||0;
  let alt=parseFloat(document.getElementById('zAlt').value)||0;
  let area=parseFloat(document.getElementById('zArea').value)||0;
  if(!area && comp>0 && alt>0) area=Math.round(comp*alt*1000)/1000;
  // garantir que comp/alt ficam sempre guardados de forma coerente com a área
  if(area>0){
    if(comp>0 && alt<=0) alt=Math.round((area/comp)*1000)/1000;
    else if(alt>0 && comp<=0) comp=Math.round((area/alt)*1000)/1000;
    else if(comp<=0 && alt<=0){ comp=area; alt=1; }
  }
  const dataAuto=document.getElementById('zData').value||hojeISO();
  if(!desc){ toast('Falta a descrição da zona'); return; }
  if(!area){ toast('Falta a área (m²)'); return; }

  const fases={};
  FS.forEach(f=>{
    const on=document.querySelector(`.fOn[data-f="${f.id}"]`).checked;
    if(!on){ fases[f.id]=null; return; }
    const mes=(document.querySelector(`.fMes[data-f="${f.id}"]`).value||mesAtual()).trim();
    const preco=parseFloat(document.querySelector(`.fPreco[data-f="${f.id}"]`).value)||0;
    const equipa=[...document.querySelectorAll(`.fEq[data-f="${f.id}"] input:checked`)].map(i=>i.value);
    fases[f.id]={mes,preco,equipa};
  });
  // preservar fases anuladas pré-existentes
  if(editZona!=='new'){ const old=db.zones.find(z=>z.id===editZona); if(old&&old.fases){ FS.forEach(f=>{ if(old.fases[f.id]&&old.fases[f.id].anulada&&!fases[f.id]) fases[f.id]=old.fases[f.id]; }); } }

  if(editZona==='new'){
    const id=db.nextZoneId||((db.zones.reduce((m,z)=>Math.max(m,z.id||0),0))+1);
    db.zones.push({id, desc, comp, alt, area, dataAuto, precos:JSON.parse(JSON.stringify(db.config.precos||{})), fases});
    db.nextZoneId=id+1;
  } else {
    const z=db.zones.find(x=>x.id===editZona);
    Object.assign(z,{desc,comp,alt,area,dataAuto,fases});
  }
  if(!db.histCfg) db.histCfg=[];
  db.histCfg.unshift({ts:new Date().toISOString().slice(0,16).replace('T',' '), txt:`[Chefe${chefe?' '+chefe:''}] zona "${desc}" lançada/editada`});
  editZona=null; saveLocal(); render(); toast('Zona guardada ✓');
}

function registarHoras(){
  const db=DB();
  const desc=(document.getElementById('hDesc').value||'').trim();
  const qtd=parseFloat(document.getElementById('hQtd').value)||0;
  const preco=(db.config.precos&&db.config.precos.HORAS!=null)?db.config.precos.HORAS:12;
  const mes=(document.getElementById('hMes').value||mesAtual()).trim();

  db.extras.push({id, desc, area:qtd, preco, mes, equipa:eq});
  db.nextExtraId=id+1;
  saveLocal(); render(); toast('Horas registadas ✓');
}

// verifica se o funcionário já tem marcação (trabalho/férias/faltas) noutra obra nesse dia
function ocupadoNoutraObra(nome, ymd){
  const atual=STORE.ativa;
  for(const o of STORE.obras){
    if(o.id===atual) continue;
    const aus=o.db.ausencias||[];
    if(aus.some(a=>a.nome===nome && a.dia===ymd)) return o.nome;
  }
  return null;
}

function marcarDia(nome, ymd){
  const db=DB(); if(!db.ausencias) db.ausencias=[];
  const i=db.ausencias.findIndex(a=>a.nome===nome&&a.dia===ymd);
  if(mapSel==='apagar'){ if(i>=0) db.ausencias.splice(i,1); saveLocal(); pintaCelula(nome,ymd); return; }
  // bloquear se já estiver noutra obra nesse dia
  const outra=ocupadoNoutraObra(nome, ymd);
  if(outra){ toast(`${nome} já está em ${lblObraCurto(outra)} no dia ${ymd.slice(8)}`); return; }
  if(mapSel.startsWith('fase:')){ const fase=mapSel.slice(5); const rec={nome,dia:ymd,tipo:'trabalho',fase}; if(i>=0) db.ausencias[i]=rec; else db.ausencias.push(rec); }
  else { const rec={nome,dia:ymd,tipo:mapSel}; if(i>=0) db.ausencias[i]=rec; else db.ausencias.push(rec); }
  saveLocal();
  pintaCelula(nome,ymd);
}
function marcarDiaEquipa(ymd){
  if(mapSel==='apagar'){
    equipaObra().forEach(nome=>{ const db=DB(); if(!db.ausencias)db.ausencias=[]; const i=db.ausencias.findIndex(a=>a.nome===nome&&a.dia===ymd); if(i>=0) db.ausencias.splice(i,1); pintaCelula(nome,ymd); });
    saveLocal(); return;
  }
  let bloqueados=[];
  equipaObra().forEach(nome=>{
    const outra=ocupadoNoutraObra(nome, ymd);
    if(outra){ bloqueados.push(nome+' ('+lblObraCurto(outra)+')'); return; }
    const db=DB(); if(!db.ausencias) db.ausencias=[];
    const i=db.ausencias.findIndex(a=>a.nome===nome&&a.dia===ymd);
    if(mapSel.startsWith('fase:')){ const fase=mapSel.slice(5); const rec={nome,dia:ymd,tipo:'trabalho',fase}; if(i>=0) db.ausencias[i]=rec; else db.ausencias.push(rec); }
    else { const rec={nome,dia:ymd,tipo:mapSel}; if(i>=0) db.ausencias[i]=rec; else db.ausencias.push(rec); }
    pintaCelula(nome,ymd);
  });
  saveLocal();
  if(bloqueados.length) toast('Já noutra obra: '+bloqueados.join(', '));
}
// nome curto da obra para mensagens
function lblObraCurto(nome){ const m=nome.match(/SEGOVIA[_\s]*(\d+)/i); return m?('Segovia '+m[1]):nome.replace(/_/g,' '); }
function pintaCelula(nome,ymd){
  const FS=fasesObra(); const db=DB();
  const a=db.ausencias.find(x=>x.nome===nome&&x.dia===ymd);
  const cel=document.querySelector(`.cel[data-cnome="${CSS.escape(nome)}"][data-cdia="${ymd}"]`);
  if(!cel) return;
  const dow=new Date(ymd+'T00:00:00').getDay(); const we=dow===0||dow===6;
  const TIPOS={ferias:'#C9A227',faltas:'#C0392B'};
  if(!a){ cel.style.background=feriadoNome(ymd)?'#EFE3F5':(we?'#EEF1F0':'#fff'); cel.textContent=''; }
  else if(a.tipo==='trabalho'){ cel.style.background=faseCor(a.fase||FS[0].id); cel.textContent=faseLetra(a.fase||FS[0].id); }
  else { cel.style.background=TIPOS[a.tipo]||'#999'; cel.textContent=a.tipo==='ferias'?'F':'•'; }
}


function entregar(out, nomeFich, modo, label){
  if(modo==='copy'){
    if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(out).then(()=>toast((label||'JSON')+' copiado ✓'),()=>fallbackCopy(out));
    else fallbackCopy(out);
    return;
  }
  const blob=new Blob([out],{type:'application/json'});
  descarregarBlob(blob, nomeFich);
  toast((label||'Ficheiro')+' descarregado ✓');
}
function fallbackCopy(t){ const ta=document.createElement('textarea'); ta.value=t; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');toast('JSON copiado ✓');}catch(e){toast('Copia manualmente');} ta.remove(); }
// download compatível com iOS Safari e Android Chrome
function descarregarBlob(blob, nomeFich){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=nomeFich; a.rel='noopener';
  document.body.appendChild(a); a.click();
  // iOS precisa de tempo antes de revogar; remover o link depois
  setTimeout(()=>{ a.remove(); URL.revokeObjectURL(url); }, 1500);
}

// ===== Exportar a OBRA ATIVA para Excel (4 folhas), sem bibliotecas (SpreadsheetML 2003) =====
function exportarExcelObra(){
  if(!temObras()){ toast('Sem obra ativa'); return; }
  const obra=obraAtiva(); const db=obra.db; const FS=fasesObra();
  const xmlEsc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const cel=(v)=>{ if(v==null||v==='') return '<Cell><Data ss:Type="String"></Data></Cell>'; const num=(typeof v==='number')||(/^-?\d+([.,]\d+)?$/.test(String(v))&&String(v).trim()!==''); if(typeof v==='number') return `<Cell><Data ss:Type="Number">${v}</Data></Cell>`; return `<Cell><Data ss:Type="String">${xmlEsc(v)}</Data></Cell>`; };
  const linha=arr=>`<Row>${arr.map(cel).join('')}</Row>`;
  const folha=(nome,linhas)=>`<Worksheet ss:Name="${xmlEsc(nome).slice(0,31)}"><Table>${linhas.map(linha).join('')}</Table></Worksheet>`;

  // Folha AUTOS (zonas)
  const autosRows=[['Zona','Comp (m)','Alt (m)','Área (m²)','Data','Anulada', ...FS.map(f=>faseNome(f.id)+' (mês)'), ...FS.map(f=>faseNome(f.id)+' (equipa)')]];
  (db.zones||[]).forEach(z=>{
    const base=[z.desc||'', z.comp||'', z.alt||'', z.area||'', z.dataAuto||'', z.anulada?'SIM':''];
    const meses=FS.map(f=>{ const fd=z.fases&&z.fases[f.id]; return (fd&&!fd.anulada&&fd.mes)?fd.mes:''; });
    const equipas=FS.map(f=>{ const fd=z.fases&&z.fases[f.id]; return (fd&&!fd.anulada&&fd.equipa)?fd.equipa.join(', '):''; });
    autosRows.push([...base,...meses,...equipas]);
  });

  // Folha MAPA (ausencias)
  const mapaRows=[['Funcionário','Dia','Tipo','Fase']];
  (db.ausencias||[]).slice().sort((a,b)=>(a.dia||'').localeCompare(b.dia||'')).forEach(a=>{
    mapaRows.push([a.nome||'', a.dia||'', a.tipo||'', a.fase?faseNome(a.fase):'']);
  });

  // Folha HORAS (extras)
  const horasRows=[['Descrição','Mês','Horas','Equipa']];
  (db.extras||[]).forEach(e=>{ horasRows.push([e.desc||'', e.mes||'', e.area||'', (e.equipa||[]).join(', ')]); });

  // Folha FATURAS (globais)
  garantirFaturas();
  const fatRows=[['Número','Data','Valor','Descrição','Estado']];
  STORE.faturas.slice().sort((a,b)=>(a.data||'').localeCompare(b.data||'')).forEach(f=>{ fatRows.push([f.numero||'', f.data||'', +f.valor||0, f.desc||'', f.estado||'']); });

  const xml=`<?xml version="1.0"?>
<?mso-application progid="Excel.Sheet"?>
<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">
${folha('Autos',autosRows)}
${folha('Mapa de trabalho',mapaRows)}
${folha('Horas',horasRows)}
${folha('Faturas',fatRows)}
</Workbook>`;

  const blob=new Blob([xml],{type:'application/vnd.ms-excel'});
  const nome=(obra.nome||'obra').replace(/\W+/g,'_').toLowerCase();
  descarregarBlob(blob, `dados_${nome}_${hojeISO()}.xls`);
  toast('Excel descarregado ✓');
}

function restaurarApp(txt){
  txt=(txt||'').trim();
  if(!txt){ toast('Escolhe o ficheiro primeiro'); return; }
  let obj; try{ obj=JSON.parse(txt); }catch(e){ toast('Ficheiro inválido'); return; }
  const s = obj.STORE || (obj.store && typeof obj.store==='object' ? obj.store : (obj.obras?obj:null));
  if(!s || !Array.isArray(s.obras)){ toast('Não reconheci esta cópia'); return; }
  if(!confirm('Restaurar esta cópia substitui TUDO o que está aqui agora. Continuar?')) return;
  STORE=s;
  if(obj.chefe) chefe=obj.chefe;
  if(Array.isArray(obj.faturas)) STORE.faturas=obj.faturas;
  STORE.obras.forEach(o=>{ if(!o.db.ausencias)o.db.ausencias=[]; if(!o.db.zones)o.db.zones=[]; if(!o.db.extras)o.db.extras=[]; });
  garantirFasesTodas(); garantirEquipaGlobal(); garantirFaturas();
  if(!STORE.ativa||!STORE.obras.some(o=>o.id===STORE.ativa)) STORE.ativa=STORE.obras[0].id;
  saveLocal(); tab='auto'; render(); toast('Cópia restaurada ✓');
}
function restaurarFicheiro(file){
  if(!file) return;
  const r=new FileReader();
  r.onload=()=>restaurarApp(String(r.result||''));
  r.onerror=()=>toast('Não consegui ler o ficheiro');
  r.readAsText(file);
}

let promptInstalar=null;   // guarda o evento beforeinstallprompt (Android/Chrome)
window.addEventListener('beforeinstallprompt', e=>{ e.preventDefault(); promptInstalar=e; render(); });
window.addEventListener('appinstalled', ()=>{ promptInstalar=null; toast('App instalada ✓'); render(); });
function appJaInstalada(){ return window.matchMedia && window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone===true; }
function ehIOS(){ return /iphone|ipad|ipod/i.test(navigator.userAgent); }
async function instalarApp(){
  if(promptInstalar){
    promptInstalar.prompt();
    try{ await promptInstalar.userChoice; }catch(e){}
    promptInstalar=null; render();
  } else if(ehIOS()){
    alert('Para instalar no iPhone:\n\n1. Abre esta página no Safari\n2. Toca no botão Partilhar (quadrado com seta ↑)\n3. Escolhe "Adicionar ao ecrã principal"');
  } else {
    alert('Para instalar:\n\nNo Chrome, toca nos três pontinhos (⋮) no canto superior direito e escolhe "Instalar aplicação" ou "Adicionar ao ecrã principal".');
  }
}

/* ============================ LOGIN / SINCRONIZAÇÃO (Firebase) ============================ */
let utilizador=null;        // {uid, email} quando logado
let syncTimer=null;         // debounce para guardar na nuvem
let appPronta=false;        // já passou pelo login

// guardar na nuvem (com atraso, para não escrever a cada toque)
function guardarNuvem(){
  if(!utilizador || !window.FB) return;
  clearTimeout(syncTimer);
  syncTimer=setTimeout(async()=>{
    try{
      sincronizarEquipaNasObras();
      await FB.guardarNuvem(utilizador.uid, { STORE, chefe, atualizado: Date.now() });
    }catch(e){ /* fica no localStorage; tenta na próxima */ }
  }, 1200);
}

// substituir saveLocal para também sincronizar na nuvem
const _saveLocalOrig = saveLocal;
saveLocal = function(){ _saveLocalOrig(); guardarNuvem(); };

// ecrã de login (overlay a cobrir tudo)
function mostrarLogin(modo){
  let ov=document.getElementById('loginOverlay');
  if(!ov){ ov=document.createElement('div'); ov.id='loginOverlay'; document.body.appendChild(ov); }
  ov.style.cssText='position:fixed;inset:0;background:var(--cinza-obra);z-index:600;display:flex;align-items:center;justify-content:center;padding:22px';
  ov.innerHTML=`<div style="background:var(--bg);width:100%;max-width:380px;border-radius:16px;padding:22px;box-shadow:0 12px 40px rgba(0,0,0,.35)">
      <div style="text-align:center;margin-bottom:16px">
        <div style="font-size:34px">📋</div>
        <div style="font-weight:800;font-size:18px;margin-top:4px">Chefe de Grupo</div>
        <div style="font-size:12px;color:var(--ink2)">Entra na tua conta</div>
      </div>
      <label class="field" style="margin-bottom:8px">Email<input type="email" id="logEmail" placeholder="o-teu@email.com" autocomplete="username" style="margin-top:4px"></label>
      <label class="field" style="margin-bottom:4px">Palavra-passe<input type="password" id="logPass" placeholder="••••••" autocomplete="current-password" style="margin-top:4px"></label>
      <div style="text-align:right;margin:2px 0 10px"><button id="logForgot" style="background:none;border:none;color:var(--verde-esc);font-size:12px;font-weight:700;cursor:pointer">Esqueci a palavra-passe</button></div>
      <button class="act" id="logBtn" style="width:100%;margin-top:6px">Entrar</button>
      <div id="logMsg" style="font-size:12px;color:var(--verm);text-align:center;min-height:16px;margin-top:8px"></div>
    </div>`;
  const msg=ov.querySelector('#logMsg');
  const email=ov.querySelector('#logEmail'), pass=ov.querySelector('#logPass');
  const fwd=ov.querySelector('#logForgot');
  if(fwd) fwd.onclick=async()=>{
    const e=(email.value||'').trim();
    if(!e){ msg.style.color='var(--verm)'; msg.textContent='Escreve o email primeiro'; return; }
    try{ await FB.recuperar(e); msg.style.color='var(--verde-esc)'; msg.textContent='Email de recuperação enviado ✓'; }
    catch(err){ msg.style.color='var(--verm)'; msg.textContent=FB.erroPt(err.code); }
  };
  const submeter=async()=>{
    const e=(email.value||'').trim(), p=pass.value||'';
    if(!e||!p){ msg.textContent='Preenche email e palavra-passe'; return; }
    msg.style.color='var(--ink2)'; msg.textContent='A processar…';
    try{
      await FB.entrar(e,p);
      // onAuth trata do resto
    }catch(err){ msg.style.color='var(--verm)'; msg.textContent=FB.erroPt(err.code); }
  };
  ov.querySelector('#logBtn').onclick=submeter;
  pass.addEventListener('keydown',ev=>{ if(ev.key==='Enter') submeter(); });
}
function esconderLogin(){ const ov=document.getElementById('loginOverlay'); if(ov) ov.remove(); }

// ao entrar: carrega da nuvem (se houver) e funde com o local
async function aoEntrar(user){
  utilizador={uid:user.uid, email:user.email};
  try{
    const nuvem=await FB.carregarNuvem(user.uid);
    if(nuvem && nuvem.STORE && Array.isArray(nuvem.STORE.obras)){
      STORE=nuvem.STORE;
      if(nuvem.chefe) chefe=nuvem.chefe;
      garantirFasesTodas(); garantirEquipaGlobal(); garantirFaturas();
      if(!STORE.ativa||!STORE.obras.some(o=>o.id===STORE.ativa)) STORE.ativa=STORE.obras[0]?STORE.obras[0].id:null;
      _saveLocalOrig();
    } else {
      // primeira vez na nuvem: envia o que está local (se houver)
      guardarNuvem();
    }
  }catch(e){ /* sem internet: usa o local */ }
  appPronta=true; esconderLogin(); tab=temObras()?'auto':'dados'; render();
}
function aoSair(){ utilizador=null; appPronta=false; STORE=storeInicial(); chefe=''; _saveLocalOrig(); mostrarLogin('entrar'); }

// arranque com Firebase
function iniciarComFirebase(){
  FB.onAuth(user=>{ if(user) aoEntrar(user); else { appPronta=false; mostrarLogin('entrar'); } });
}
if(window.FB) iniciarComFirebase();
else window.addEventListener('fb-ready', iniciarComFirebase, {once:true});

// se o Firebase não carregar (sem internet à 1ª), mostra a app em modo local após 5s
setTimeout(()=>{ if(!window.FB && !appPronta){ esconderLogin(); appPronta=true; render(); toast('Sem ligação — modo local'); } }, 5000);
</script>
