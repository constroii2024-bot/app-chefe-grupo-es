        <div style="font-size:13px;color:var(--ink2)">Entra na tua conta</div>
      </div>
      <label class="field" style="margin-bottom:10px">Email<input type="email" id="logEmail" placeholder="o-teu@email.com" autocomplete="username" style="margin-top:4px;padding:12px"></label>
      <label class="field" style="margin-bottom:6px">Palavra-passe<input type="password" id="logPass" placeholder="••••••" autocomplete="current-password" style="margin-top:4px;padding:12px"></label>
      <div style="text-align:right;margin:2px 0 14px"><button id="logForgot" style="background:none;border:none;color:var(--verde-esc);font-size:12px;font-weight:700;cursor:pointer">Esqueci a palavra-passe</button></div>
      <button class="act" id="logBtn" style="width:100%;margin-top:6px;padding:16px;font-size:17px;font-weight:800;border-radius:12px">Entrar</button>
      <div id="logMsg" style="font-size:12px;color:var(--verm);text-align:center;min-height:16px;margin-top:10px"></div>
    </div>`;
  const msg=ov.querySelector('#logMsg');
  const email=ov.querySelector('#logEmail'), pass=ov.querySelector('#logPass');
  const fwd=ov.querySelector('#logForgot');
  if(fwd) fwd.onclick=async()=>{
    const e=(email.value||'').trim();
    if(!e){ msg.style.color='var(--verm)'; msg.textContent='Escreve o email primeiro'; return; }
    try{ await FB.recuperar(e); msg.style.color='var(--verde-esc)'; msg.textContent='Email de recuperação enviado ✓'; }
    catch(err){ msg.style.color='var(--verm)'; msg.textContent=FB.erroPt(err.code); }
  };
  const submeter=async()=>{
    const e=(email.value||'').trim(), p=pass.value||'';
    if(!e||!p){ msg.textContent='Preenche email e palavra-passe'; return; }
    msg.style.color='var(--ink2)'; msg.textContent='A processar…';
    try{
      await FB.entrar(e,p);
      // onAuth trata do resto
    }catch(err){ msg.style.color='var(--verm)'; msg.textContent=FB.erroPt(err.code); }
  };
  ov.querySelector('#logBtn').onclick=submeter;
  pass.addEventListener('keydown',ev=>{ if(ev.key==='Enter') submeter(); });
}
function esconderLogin(){ const ov=document.getElementById('loginOverlay'); if(ov) ov.remove(); }

// ao entrar: carrega da nuvem (se houver) e funde com o local
async function aoEntrar(user){
  utilizador={uid:user.uid, email:user.email};
  try{
    const nuvem=await FB.carregarNuvem(user.uid);
    if(nuvem && nuvem.STORE && Array.isArray(nuvem.STORE.obras)){
      STORE=nuvem.STORE;
      if(nuvem.chefe) chefe=nuvem.chefe;
      ultimoSyncCloud=nuvem.atualizado||Date.now();
      garantirFasesTodas(); garantirEquipaGlobal(); garantirFaturas();
      if(!STORE.ativa||!STORE.obras.some(o=>o.id===STORE.ativa)) STORE.ativa=STORE.obras[0]?STORE.obras[0].id:null;
      _saveLocalOrig();
    } else {
      // primeira vez na nuvem: envia o que está local (se houver)
      ultimoSyncCloud=Date.now();
      guardarNuvem();
    }
  }catch(e){ /* sem internet: usa o local */ }
  appPronta=true; esconderLogin(); tab=temObras()?'auto':'dados'; render();
}
function aoSair(){ utilizador=null; appPronta=false; STORE=storeInicial(); chefe=''; _saveLocalOrig(); mostrarLogin('entrar'); }

// arranque com Firebase
function iniciarComFirebase(){
  FB.onAuth(user=>{ if(user) aoEntrar(user); else { appPronta=false; mostrarLogin('entrar'); } });
}
// mostrar logo o ecrã de login (fundo verde) enquanto o Firebase verifica a sessão
mostrarLogin();
if(window.FB) iniciarComFirebase();
else window.addEventListener('fb-ready', iniciarComFirebase, {once:true});

// se o Firebase não carregar (sem internet à 1ª), mostra a app em modo local após 5s
setTimeout(()=>{ if(!window.FB && !appPronta){ esconderLogin(); appPronta=true; render(); toast('Sem ligação — modo local'); } }, 5000);

/* ============================ AVISO DE VERSÃO NOVA ============================ */
let avisoVersaoMostrado=false;
async function verificarVersao(){
  if(avisoVersaoMostrado) return;
  try{
    const url=location.pathname + '?_=' + Date.now(); // anti-cache
    const resp=await fetch(url, {cache:'no-store'});
    if(!resp.ok) return;
    const txt=await resp.text();
    const m=txt.match(/const APP_VERSAO\s*=\s*'([^']+)'/);
    if(m && m[1] && m[1]!==APP_VERSAO){
      avisoVersaoMostrado=true;
      mostrarAvisoVersao();
    }
  }catch(e){ /* sem rede: ignora */ }
}
function mostrarAvisoVersao(){
  const b=document.createElement('div');
  b.style.cssText='position:fixed;left:0;right:0;bottom:0;z-index:580;background:var(--verde);color:#fff;padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom,0px));display:flex;align-items:center;gap:10px;box-shadow:0 -4px 16px rgba(0,0,0,.2)';
  b.innerHTML=`<div style="flex:1;font-size:13px;font-weight:700">✨ Há uma versão nova da app disponível.</div>
    <button id="vAtualizar" style="background:#fff;color:var(--verde-esc);border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:800;white-space:nowrap;cursor:pointer">Atualizar</button>
    <button id="vDepois" style="background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:0 4px">✕</button>`;
  document.body.appendChild(b);
  b.querySelector('#vAtualizar').onclick=()=>{ location.reload(true); };
  b.querySelector('#vDepois').onclick=()=>b.remove();
}
// verifica ao arrancar (após 8s) e cada 10 minutos
setTimeout(verificarVersao, 8000);
setInterval(verificarVersao, 600000);
// e quando a app volta a ficar visível (reabrir)
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) verificarVersao(); });
</script>
